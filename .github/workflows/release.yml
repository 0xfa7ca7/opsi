name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Verify tag context and locate its successful CI run
        id: ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$GITHUB_REF_TYPE" = "tag"
          test "$GITHUB_REF" = "refs/tags/$GITHUB_REF_NAME"
          test "$(git rev-list -n 1 "$GITHUB_REF_NAME")" = "$GITHUB_SHA"
          RUN_JSON=""
          for attempt in $(seq 1 30); do
            RUN_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$GITHUB_SHA&branch=$GITHUB_REF_NAME&event=push&status=success" --jq '.workflow_runs[0] // empty')"
            if [ -n "$RUN_JSON" ]; then
              break
            fi
            sleep 20
          done
          test -n "$RUN_JSON"
          RUN_ID="$(jq -r '.id' <<<"$RUN_JSON")"
          CI_HEAD_SHA="$(jq -r '.head_sha' <<<"$RUN_JSON")"
          CI_EVENT="$(jq -r '.event' <<<"$RUN_JSON")"
          CI_HEAD_BRANCH="$(jq -r '.head_branch' <<<"$RUN_JSON")"
          test -n "$RUN_ID"
          test "$CI_HEAD_SHA" = "$GITHUB_SHA"
          test "$CI_EVENT" = "push"
          test "$CI_HEAD_BRANCH" = "$GITHUB_REF_NAME"
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: canonical-npm-package
          path: artifacts
          run-id: ${{ steps.ci.outputs.run-id }}
          github-token: ${{ github.token }}
      - name: Verify canonical tag, embedded version, digest, and package absence
        shell: bash
        run: |
          cd artifacts && sha256sum --check SHA256SUMS && cd ..
          TARBALL="$(find "$GITHUB_WORKSPACE/artifacts" -name '*.tgz' -print -quit)"
          test -n "$TARBALL"
          npm pack "$TARBALL" --dry-run --json > artifacts/verified-pack.json
          VERSION="$(tar -xOf "$TARBALL" package/package.json | node -e 'let s="";process.stdin.on("data",c=>s+=c).on("end",()=>process.stdout.write(JSON.parse(s).version))')"
          NAME="$(tar -xOf "$TARBALL" package/package.json | node -e 'let s="";process.stdin.on("data",c=>s+=c).on("end",()=>process.stdout.write(JSON.parse(s).name))')"
          test "$NAME" = "opsi"
          test "$GITHUB_REF_NAME" = "v$VERSION"
          EXPECTED_INTEGRITY="sha512-$(openssl dgst -sha512 -binary "$TARBALL" | openssl base64 -A)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "EXPECTED_INTEGRITY=$EXPECTED_INTEGRITY" >> "$GITHUB_ENV"
          if npm view "opsi@$VERSION" version >/tmp/existing-package 2>/tmp/npm-view-error; then
            echo "opsi@$VERSION already exists" >&2
            exit 1
          fi
          grep -q E404 /tmp/npm-view-error
      - run: npm install --global npm@^11.5.1
      - name: Verify bootstrap or trusted publishing authentication
        env:
          BOOTSTRAP_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "$VERSION" = "0.0.1" ]; then
            test -n "$BOOTSTRAP_NPM_TOKEN"
          else
            test -z "$BOOTSTRAP_NPM_TOKEN"
          fi
      - name: Publish tested tarball with bootstrap token or trusted publishing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "$TARBALL" --provenance --access public
      - name: Verify published bytes, install, and provenance
        shell: bash
        run: |
          ACTUAL_INTEGRITY=""
          for attempt in $(seq 1 12); do
            ACTUAL_INTEGRITY="$(npm view "opsi@$VERSION" dist.integrity 2>/dev/null || true)"
            test "$ACTUAL_INTEGRITY" = "$EXPECTED_INTEGRITY" && break
            sleep 10
          done
          test "$ACTUAL_INTEGRITY" = "$EXPECTED_INTEGRITY"
          mkdir registry published
          for attempt in $(seq 1 12); do
            npm pack "opsi@$VERSION" --pack-destination registry && break
            sleep 10
          done
          test "$(sha256sum "$TARBALL" | cut -d' ' -f1)" = "$(sha256sum registry/*.tgz | cut -d' ' -f1)"
          cd published && npm init -y
          npm install "opsi@$VERSION"
          ./node_modules/.bin/opsi --version
          npm audit signatures
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: artifacts/*.tgz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets-${{ github.ref_name }}
          path: |
            artifacts/*.tgz
            artifacts/SHA256SUMS
          if-no-files-found: error

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.ref }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets-${{ github.ref_name }}
          path: artifacts
      - name: Create immutable GitHub Release assets from canonical bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts && sha256sum --check SHA256SUMS && cd ..
          gh release create "$GITHUB_REF_NAME" artifacts/*.tgz artifacts/SHA256SUMS \
            --verify-tag \
            --target "$GITHUB_SHA" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
