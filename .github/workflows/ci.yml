name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Prove clean-source ordering
        run: rm -rf apps/cli/dist packages/*/dist packages/providers/*/dist
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
      - run: corepack enable && corepack prepare pnpm@11.11.0 --activate
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:unit
        env:
          OPSI_OFFLINE: "1"
      - run: pnpm test:integration
        env:
          OPSI_OFFLINE: "1"
      - run: pnpm test:e2e
        env:
          OPSI_OFFLINE: "1"
      - name: Create and test canonical tarball bytes
        run: mkdir -p artifacts && pnpm test:pack
        env:
          OPSI_OFFLINE: "1"
          OPSI_PACK_DESTINATION: ${{ github.workspace }}/artifacts
      - name: Record canonical tarball checksum
        run: |
          TARBALL="$(find artifacts -name '*.tgz' -exec basename {} \; -quit)"
          test -n "$TARBALL"
          cd artifacts && sha256sum "$TARBALL" > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: canonical-npm-package
          path: |
            artifacts/*.tgz
            artifacts/SHA256SUMS
            artifacts/pack.json
          if-no-files-found: error

  zsh-completion:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
      - run: corepack enable && corepack prepare pnpm@11.11.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec vitest run --project cli-e2e apps/cli/test/complete-surface.e2e.test.ts -t "functionally completes"
        env:
          OPSI_OFFLINE: "1"

  exact-install:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            libc: glibc
          - os: macos-14
            platform: darwin
            arch: arm64
            libc: none
          - os: windows-latest
            platform: win32
            arch: x64
            libc: none
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: canonical-npm-package
          path: artifacts
      - name: Record runtime facts
        shell: bash
        env:
          EXPECTED_PLATFORM: ${{ matrix.platform }}
          EXPECTED_ARCH: ${{ matrix.arch }}
          EXPECTED_LIBC: ${{ matrix.libc }}
        run: |
          node --input-type=module -e '
            const facts={platform:process.platform,arch:process.arch,node:process.version,glibc:process.report?.getReport().header.glibcVersionRuntime??null};
            console.log(JSON.stringify(facts));
            if(facts.platform!==process.env.EXPECTED_PLATFORM) throw new Error(`platform ${facts.platform}`);
            if(facts.arch!==process.env.EXPECTED_ARCH) throw new Error(`arch ${facts.arch}`);
            if(process.env.EXPECTED_LIBC==="glibc"&&!facts.glibc) throw new Error("glibc required");
          '
          npm --version
      - name: Install and smoke exact bytes
        shell: bash
        run: |
          mkdir install && cd install
          npm init -y
          npm install "$(find ../artifacts -name '*.tgz' -print -quit)"
          ./node_modules/.bin/opsi --version
          ./node_modules/.bin/opsi doctor --json --offline
          node -e "import('@duckdb/node-api').then(x=>console.log({binding:!!x.DuckDBInstance}))"
          ./node_modules/.bin/opsi query ../packages/testing/fixtures/data/valid.csv --sql "select 42 as answer" --json
          node -e "import('opsi/sdk').then(x=>console.log({sdk:!!x.OpsiClient}))"

  current-node-advisory:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: current
      - run: corepack enable && corepack prepare pnpm@11.11.0 --activate
      - run: pnpm install --frozen-lockfile && pnpm test && pnpm test:pack
